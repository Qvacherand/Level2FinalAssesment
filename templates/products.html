<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Fairway Finds</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <a href="/">Fairway Finds</a>
            <a href="/products">Products</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main>
        <h1>All Products</h1>

     <!-- search and filter bar -->
        <form method="GET" action="/products">
            <input type="text" name="search" placeholder="Search products..." value="{{ search }}">
            <select name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category['category_id'] }}" {% if category['category_id']|string == selected_category %}selected{% endif %}>
                    {{ category['name'] }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>

    <!-- product display -->
        <section class="product-grid">
            {% for product in products %}
            <div class="product-card">
                <img src="{{ url_for('static', filename='images/' + product['image']) }}" alt="{{ product['name'] }}">
                <p>{{ product['name'] }}</p>
                <p>${{ product['price'] }}</p>
                <a href="/product/{{ product['product_id'] }}">View Product</a>
            </div>
            {% endfor %}
        </section>
    </main>

    <footer>
        <p>Fairway Finds 2025</p>
    </footer>
</body>
</html>
